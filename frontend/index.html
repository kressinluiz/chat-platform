<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="login">
        <input id="username" type="text" placeholder="Enter username..." autocomplete="off" />
        <input id="password" type="password" placeholder="Enter password..." autocomplete="off" />
        <button id="connect">Connect</button>
    </div>

    <div id="rooms">
        <h2>Chat Rooms</h2>
        <ul id="room-list"></ul>
        <input id="new-room" type="text" placeholder="New room name..." autocomplete="off" />
        <button id="create-room">Create Room</button>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <input id="message" type="text" placeholder="Type a message..." autocomplete="off" />
        <button id="send">Send</button>
    </div>

    <script src="index.js"></script>
</body>

</html>
