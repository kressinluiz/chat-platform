<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        #login { margin-bottom: 20px; }
        #chat { display: none; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        #message { width: 80%; padding: 8px; }
        #send { padding: 8px 16px; }
    </style>
</head>
<body>
    <div id="login">
        <input id="username" type="text" placeholder="Enter username..." autocomplete="off"/>
        <button id="connect">Connect</button>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <input id="message" type="text" placeholder="Type a message..." autocomplete="off"/>
        <button id="send">Send</button>
    </div>

    <script>
        const loginDiv   = document.getElementById("login");
        const chatDiv    = document.getElementById("chat");
        const messages   = document.getElementById("messages");
        const input      = document.getElementById("message");
        const btn        = document.getElementById("send");
        const usernameEl = document.getElementById("username");
        const connectBtn = document.getElementById("connect");

        let ws = null;

        connectBtn.addEventListener("click", function() {
            const username = usernameEl.value.trim();
            if (username === "" || username.length > 20) return;

            ws = new WebSocket("ws://localhost:8080/ws");

            ws.onopen = function() {
                ws.send(username);
                loginDiv.style.display = "none";
                chatDiv.style.display  = "block";
                appendMessage("-- connected as " + username + " --");
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                const time = new Date(msg.timestamp).toLocaleTimeString();
                appendMessage("[" + time + "] " + msg.username + ": " + msg.text);
            };

            ws.onclose = function() {
                appendMessage("-- disconnected --");
                loginDiv.style.display = "block";
                chatDiv.style.display  = "none";
            };

            ws.onerror = function() {
                appendMessage("-- error --");
            };
        });

        btn.addEventListener("click", sendMessage);

        input.addEventListener("keydown", function(event) {
            if (event.key === "Enter") sendMessage();
        });

        function sendMessage() {
            const text = input.value.trim();
            if (text === "" || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ text: text }));
            input.value = "";
        }

        function appendMessage(text) {
            const div = document.createElement("div");
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
